name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Avoid stacked 90-minute macOS jobs when pushes land close together.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGINVAL_VERSION: v1.0.4
  # RelWithDebInfo + no LTO: see docs/developer/CI.md (Release+LTO exceeded 90m on macOS).
  CMAKE_BUILD_TYPE: RelWithDebInfo

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja and ccache
        run: brew install ninja ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-macos-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Source/**', 'Tests/**') }}
          restore-keys: |
            ccache-macos-${{ runner.os }}-

      - name: Configure
        run: |
          ccache -z
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DSVC_ENABLE_LTO=OFF \
            -DSVC_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: ccache stats
        run: ccache -s

      - name: Run engine tests
        run: ctest --test-dir build --output-on-failure

      - name: Export factory profiles
        run: cmake --build build --target export-factory-profiles

      - name: Install pluginval
        run: |
          curl -fsSL -o pluginval.zip "https://github.com/Tracktion/pluginval/releases/download/${PLUGINVAL_VERSION}/pluginval_macOS.zip"
          unzip -q pluginval.zip
          test -x pluginval.app/Contents/MacOS/pluginval

      - name: Validate plugins (pluginval strictness 5)
        run: |
          mkdir -p pluginval-logs
          PV="./pluginval"
          if [ -d pluginval.app ]; then PV="./pluginval.app/Contents/MacOS/pluginval"; fi
          validate() {
            echo "=== pluginval: $1 ==="
            # Unsigned AU bundles are invisible to macOS until ad-hoc signed (CI has no cert).
            if [[ "$1" == *.component ]]; then
              codesign --force --sign - --timestamp=none --deep "$1"
            fi
            "$PV" --validate-in-process --strictness-level 5 --timeout-ms 120000 --output-dir pluginval-logs "$1"
          }
          validate "build/SuperVelocityCurve_artefacts/${CMAKE_BUILD_TYPE}/VST3/Super VelocityCurve.vst3"
          validate "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/VST3/Super VelocityCurve MIDI FX.vst3"
          validate "build/SuperVelocityCurve_artefacts/${CMAKE_BUILD_TYPE}/AU/Super VelocityCurve.component"
          validate "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/AU/Super VelocityCurve MIDI FX.component"
          if [ -d "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/CLAP" ]; then
            validate "$(find build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/CLAP -name '*.clap' | head -1)"
          fi

      - name: Validate AU (auval)
        continue-on-error: true
        run: |
          auval -v aumf Svvc Svcv || echo "auval aumf skipped (unsigned)"
          auval -v aumi Svvc Svc2 || echo "auval aumi skipped (unsigned)"

      - name: Package macOS artifacts
        run: |
          mkdir -p dist
          cp -R "build/SuperVelocityCurve_artefacts/${CMAKE_BUILD_TYPE}/AU/Super VelocityCurve.component" dist/
          cp -R "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/AU/Super VelocityCurve MIDI FX.component" dist/
          cp -R "build/SuperVelocityCurve_artefacts/${CMAKE_BUILD_TYPE}/VST3/Super VelocityCurve.vst3" dist/
          cp -R "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/VST3/Super VelocityCurve MIDI FX.vst3" dist/
          cp -R "build/SuperVelocityCurve_artefacts/${CMAKE_BUILD_TYPE}/Standalone/Super VelocityCurve.app" dist/
          if [ -d "build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/CLAP" ]; then
            cp -R build/SuperVelocityCurveMidiFx_artefacts/${CMAKE_BUILD_TYPE}/CLAP/*.clap dist/ 2>/dev/null || true
          fi
          cd dist && zip -r ../SuperVelocityCurve-macOS-unsigned.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-macOS
          path: SuperVelocityCurve-macOS-unsigned.zip

      - uses: actions/upload-artifact@v4
        with:
          name: pluginval-logs-macos
          path: pluginval-logs/

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DSVC_ENABLE_LTO=OFF `
            -DSVC_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Run engine tests
        shell: pwsh
        run: ctest --test-dir build -C $env:CMAKE_BUILD_TYPE --output-on-failure

      - name: Export factory profiles
        shell: pwsh
        run: cmake --build build --config $env:CMAKE_BUILD_TYPE --target export-factory-profiles

      - name: Validate plugins (pluginval strictness 5)
        shell: pwsh
        run: |
          $release = "https://github.com/Tracktion/pluginval/releases/download/$env:PLUGINVAL_VERSION"
          Invoke-WebRequest -Uri "$release/pluginval_Windows.zip" -OutFile pluginval.zip
          Expand-Archive -Path pluginval.zip -DestinationPath pluginval_dir -Force
          $pv = Get-ChildItem -Path pluginval_dir -Recurse -Filter pluginval.exe | Select-Object -First 1
          if (-not $pv) { throw "pluginval.exe not found" }
          New-Item -ItemType Directory -Force -Path pluginval-logs | Out-Null
          function Validate-Plugin($path) {
            $absPath = (Resolve-Path -LiteralPath $path).Path
            Write-Host "=== pluginval: $absPath ==="
            $argumentList = @(
              '--validate-in-process',
              '--strictness-level', '5',
              '--timeout-ms', '120000',
              '--output-dir', 'pluginval-logs',
              "`"$absPath`""
            ) -join ' '
            $proc = Start-Process -FilePath $pv.FullName -ArgumentList $argumentList -Wait -PassThru -NoNewWindow
            if ($proc.ExitCode -ne 0) {
              throw "pluginval failed for $absPath (exit $($proc.ExitCode))"
            }
          }
          Validate-Plugin "build/SuperVelocityCurve_artefacts/$env:CMAKE_BUILD_TYPE/VST3/Super VelocityCurve.vst3"
          Validate-Plugin "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/VST3/Super VelocityCurve MIDI FX.vst3"
          # Windows CLAP is a flat .clap DLL; pluginval's lilv scanner expects a macOS-style bundle.
          if (Test-Path "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/CLAP") {
            $clap = Get-ChildItem "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/CLAP" -Filter *.clap | Select-Object -First 1
            if ($clap) {
              Write-Host "=== CLAP built: $($clap.FullName) (pluginval skipped on Windows — flat DLL) ==="
            }
          }

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/$env:CMAKE_BUILD_TYPE/VST3/Super VelocityCurve.vst3" dist/
          Copy-Item -Recurse "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/VST3/Super VelocityCurve MIDI FX.vst3" dist/
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/$env:CMAKE_BUILD_TYPE/Standalone/Super VelocityCurve.exe" dist/
          if (Test-Path "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/CLAP") {
            Copy-Item -Recurse "build/SuperVelocityCurveMidiFx_artefacts/$env:CMAKE_BUILD_TYPE/CLAP/*.clap" dist/ -ErrorAction SilentlyContinue
          }
          Compress-Archive -Path dist/* -DestinationPath SuperVelocityCurve-Windows-unsigned.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-Windows
          path: SuperVelocityCurve-Windows-unsigned.zip

      - uses: actions/upload-artifact@v4
        with:
          name: pluginval-logs-windows
          path: pluginval-logs/
