name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.3)"
        required: true
        default: "0.2.3"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja and ccache
        run: brew install ninja ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-macos-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt', 'Source/**') }}
          restore-keys: |
            ccache-release-macos-${{ matrix.arch }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DSVC_ENABLE_LTO=OFF \
            -DSVC_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          mkdir -p dist
          cp -R "build/SuperVelocityCurve_artefacts/Release/AU/Super Velocity Curve.component" dist/
          cp -R "build/SuperVelocityCurveMidiFx_artefacts/Release/AU/Super Velocity Curve MIDI FX.component" dist/
          cp -R "build/SuperVelocityCurve_artefacts/Release/VST3/Super Velocity Curve.vst3" dist/
          cp -R "build/SuperVelocityCurveMidiFx_artefacts/Release/VST3/Super Velocity Curve MIDI FX.vst3" dist/
          cp -R "build/SuperVelocityCurve_artefacts/Release/Standalone/Super Velocity Curve.app" dist/
          if [ -d "build/SuperVelocityCurveMidiFx_artefacts/Release/CLAP" ]; then
            cp -R build/SuperVelocityCurveMidiFx_artefacts/Release/CLAP/*.clap dist/ 2>/dev/null || true
          fi
          cp scripts/install-macos.sh dist/
          cp "dist-assets/macOS/Install Super Velocity Curve.command" dist/
          cp dist-assets/macOS/README.txt dist/
          chmod +x dist/install-macos.sh
          chmod +x "dist/Install Super Velocity Curve.command"
          bash scripts/verify-macos-installer.sh dist
          cd dist && zip -r ../SuperVelocityCurve-macOS-${{ matrix.arch }}-unsigned.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-macOS-${{ matrix.arch }}
          path: SuperVelocityCurve-macOS-${{ matrix.arch }}-unsigned.zip

  merge-macos-universal:
    needs: build-macos
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download arch artefacts
        uses: actions/download-artifact@v4
        with:
          path: arch-zips

      - name: Extract and lipo
        run: |
          mkdir -p arch/arm64 arch/x86_64 dist-universal
          unzip -q arch-zips/SuperVelocityCurve-macOS-arm64/SuperVelocityCurve-macOS-arm64-unsigned.zip -d arch/arm64
          unzip -q arch-zips/SuperVelocityCurve-macOS-x86_64/SuperVelocityCurve-macOS-x86_64-unsigned.zip -d arch/x86_64
          bash scripts/lipo-macos-universal.sh arch/arm64 arch/x86_64 dist-universal
          bash scripts/verify-macos-installer.sh dist-universal
          cd dist-universal && zip -r ../SuperVelocityCurve-macOS-unsigned.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-macOS
          path: SuperVelocityCurve-macOS-unsigned.zip

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DSVC_ENABLE_LTO=OFF `
            -DSVC_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C $env:CMAKE_BUILD_TYPE --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/Release/VST3/Super Velocity Curve.vst3" dist/
          Copy-Item -Recurse "build/SuperVelocityCurveMidiFx_artefacts/Release/VST3/Super Velocity Curve MIDI FX.vst3" dist/
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/Release/Standalone/Super Velocity Curve.exe" dist/
          if (Test-Path "build/SuperVelocityCurveMidiFx_artefacts/Release/CLAP") {
            Copy-Item -Recurse "build/SuperVelocityCurveMidiFx_artefacts/Release/CLAP/*.clap" dist/ -ErrorAction SilentlyContinue
          }
          Compress-Archive -Path dist/* -DestinationPath SuperVelocityCurve-Windows-unsigned.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-Windows
          path: SuperVelocityCurve-Windows-unsigned.zip

  publish:
    needs: [merge-macos-universal, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: Super Velocity Curve ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || false }}
          files: |
            artifacts/SuperVelocityCurve-macOS/SuperVelocityCurve-macOS-unsigned.zip
            artifacts/SuperVelocityCurve-Windows/SuperVelocityCurve-Windows-unsigned.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
